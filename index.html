<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ignacio Rueda Delgado</title>
</head>
<body>
    <div id="container">
        <div class="descripcion">
            <p>Hola! Mi nombre es Ignacio, he trabajado con estos lenguajes:</p>
            <ul>
                <li>
                    <figure>
                        <img id="hide-me"src="/logoArduino.png" alt="logo_arduino">
                    </figure>
                </li>
                <li>
                    <figure>
                        <img src="/c++.png" alt="logo_arduino">
                    </figure>
                </li>
                <li>
                    <figure>
                        <img src="/python.png" alt="logo_python">
                    </figure>
                </li>
                <li>
                    <figure>
                        <img src="/sql.png" alt="logo_sql">
                    </figure>
                </li>
            </ul>
            <p>Si te animas, échale un vistazo a algunos de mis proyectos!</p>
        </div>
        <div class="descripcion">
            <p>ARDUINO: CALCULADORA - SENSOR DE TEMPERATURA</p>
            <figure>
                <a href="#" onclick="return ShowContent('video-c');"><img src="./show.png" alt="show"></a>
            </figure>
        </div>
        <div id="video-c">
            <video controls autoplay muted>
                <source src="/calculator.mp4" type="video/mp4">
            </video>
        </div>
        <div class="descripcion">
            <p>ARDUINO: BRAZO ROBOT</p>
        </div>
        <div class="videos">
            <video controls muted>
                <source src="/brazo-robot.mp4" type="video/mp4">
            </video>
        </div>
        <div class="descripcion">
            <p>ARDUINO: SEMÁFORO SEÑAL ACÚSTICA</p>
        </div>
        <div class="videos">
            <video controls muted>
                <source src="/SEMÁFORO - SEÑAL ACÚSTICA.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <script type="text/javascript">
        function ShowContent(content) {
            document.getElementById("video-c").style.display = 'none';/*style.display = 'none' supone ocultar todo el elemento*/
            document.getElementById(content).style.display = 'block';
        }
    </script>
</body>
 

</html>
